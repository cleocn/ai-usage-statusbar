<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="180" viewBox="0 0 1600 180" role="img" aria-label="AI Usage Status Bar preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#007acc"/>
      <stop offset="100%" stop-color="#0060a8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#042b47" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1600" height="180" fill="#1e1e1e"/>
  <rect x="0" y="96" width="1600" height="84" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="54" y="112" width="270" height="46" rx="10" fill="#0e639c" stroke="#7fc7ff" stroke-opacity="0.35"/>
    <text x="78" y="142" fill="#ffffff" font-family="SF Pro Display, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Copilot 32/50 64%</text>

    <rect x="346" y="112" width="288" height="46" rx="10" fill="#0e639c" stroke="#7fc7ff" stroke-opacity="0.35"/>
    <text x="370" y="142" fill="#ffffff" font-family="SF Pro Display, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Codex 5h90% 7d54%</text>

    <rect x="656" y="112" width="340" height="46" rx="10" fill="#0e639c" stroke="#7fc7ff" stroke-opacity="0.35"/>
    <text x="680" y="142" fill="#ffffff" font-family="SF Pro Display, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Cursor AUTO21% API0%</text>
  </g>
  <text x="54" y="44" fill="#d4d4d4" font-family="SF Pro Display, Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">AI Usage Status Bar Preview</text>
  <text x="54" y="74" fill="#9fbad0" font-family="SF Pro Display, Segoe UI, Arial, sans-serif" font-size="20">Updated sample based on the current status bar format</text>
</svg>
